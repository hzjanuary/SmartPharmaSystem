services:
  mysql:
    image: mysql:8.4
    container_name: smartpharma_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-pharmacymanagement}
      MYSQL_USER: ${MYSQL_USER:-smartpharma}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smartpharma}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init/pharmacymanagement.sql:/docker-entrypoint-initdb.d/01_pharmacymanagement.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - sps-network

  ai-service:
    build:
      context: ./ai-service
    container_name: smartpharma_ai
    restart: unless-stopped
    env_file:
      - ./ai-service/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://smartpharma:smartpharma@mysql:3306/pharmacymanagement}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sps-network

  backend:
    build:
      context: ./backend
    container_name: smartpharma_backend
    restart: unless-stopped
    environment:
      PORT: ${PORT:-5000}
      DB_HOST: ${DB_HOST:-mysql}
      DB_USER: ${DB_USER:-smartpharma}
      DB_PASS: ${DB_PASS:-smartpharma}
      DB_NAME: ${DB_NAME:-pharmacymanagement}
      DB_PORT: ${DB_PORT:-3306}
      SESSION_SECRET: ${SESSION_SECRET:-smartpharma_local_secret}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      AI_SERVICE_URL: http://ai-service:8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:-}
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_started
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - sps-network

  frontend:
    build:
      context: ./frontend/spsver1
    container_name: smartpharma_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:5000
      VITE_BACKEND_URL: http://localhost:5000
      VITE_AI_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
      ai-service:
        condition: service_started
    networks:
      - sps-network

  sps-agent:
    build:
      context: ./sps-agent
    container_name: smartpharma_sps_agent
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_OWNER_ID: ${TELEGRAM_OWNER_ID:-0}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://smartpharma:smartpharma@mysql:3306/pharmacymanagement}
      AGENT_NAME: ${AGENT_NAME:-SPS Agent}
      SHORT_TERM_LIMIT: ${SHORT_TERM_LIMIT:-10}
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_started
    networks:
      - sps-network

networks:
  sps-network:
    name: sps-network

volumes:
  mysql_data:
  backend_uploads:
